<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>
            Emoji Memory Match || 30 Days Web Games Challenge
        </title>
        <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div id="win-overlay">
            <div class="win-card">
                <span class="win-emoji">🎉</span>
                <div class="win-title">You Win! </div>
                <div class="win-subtitle">All pairs matched!</div>

                <div class="win-stats">
                    <div class="win-stat">
                        <span id="win-moves" class="win-stat-val m">0</span>
                        <div class="win-stat-label">Moves</div>
                    </div>
                    <div class="win-stat">
                        <span id="win-time" class="win-stat-val t">0s</span>
                        <div class="win-stat-label">Time</div>
                    </div>

                    <div class="win-stat">
                        <span id="win-stars" class="win-stat-val s">⭐⭐⭐</span>
                        <div class="win-stat-label">Rating</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="restartGame()">Play Again</button>
            </div>
        </div>
    <header>
        <div class="day-label"> Day 01 - 30-Day Challenge </div>
        <h1>Emoji <span>Memory </span>Match</h1>
        <p class="subtitle">Flip - Match - Win</p>
    </header>

    <div class="stats">
        <div class="stat-box">
            <span id="stat-moves" class="stat-val moves">0</span>
            <div class="stat-label">Moves</div>
        </div>
        <div class="stat-box">
            <span id="stat-pairs" class="stat-val pairs">0 / 0</span>
            <div class="stat-label">Pairs</div>
        </div>
        <div class="stat-box">
            <span id="stat-time" class="stat-val time">0</span>
            <div class="stat-label">Time</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" onclick="restartGame()">Restart</button>
    </div>

    <div class="grid-wrap">
        <div id="grid" class="size-4"></div>
    </div>

    <script src="script.js"></script>
    </body>
</html>
